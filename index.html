<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header">
            <div class="logo-text">
                Manchester United Fan-Page
            </div>
            
            <ul class="right-links">
                 <li><a href="#">News</a></li>
                <li><a href="#">Team</a></li>
                <li><a href="#">History</a></li>
            </ul>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-main">
                Who's Manchester United?
            </div>
            <p class="hero-subtext">
                Manchester United is a football club that play in the Premier League of England. <br>
                Their colors are red, black, and white. They play in Old Trafford, Manchester, England and 
                are nicknamed the Red Devils
            </p>
            <button class="fan-button">Become a fan!</button>
        </div>

        <div class="hero-img">
            <img src="images/hero-img.jpg" alt="photo of outside stadium" width="700" height="450">
        </div>
    </section>
</body>
</html>
